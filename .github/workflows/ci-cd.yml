name: Push Docker Images
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Docker Container
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Actions
        uses: docker/setup-buildx-action@v2

      - name: Make script executable (if needed)
        run: chmod +x ./scripts/test.sh

      - name: Build and Test
        run: |
          ./scripts/test.sh
        env:
          NODE_ENV: testing
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          SALT_ROUNDS: ${{ vars.SALT_ROUNDS }}
          POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ vars.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          JWT_SECRET: ${{ vars.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ vars.JWT_REFRESH_SECRET }}
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION }}
          JWT_REFRESH_EXPIRATION: ${{ vars.JWT_REFRESH_EXPIRATION }}

  build-and-push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    environment: production
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Actions
        uses: docker/setup-buildx-action@v2

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          docker compose -f docker-compose-deploy.yml build
          docker compose -f docker-compose-deploy.yml push
        env:
          NODE_ENV: production
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          NGINX_PORT: ${{ vars.NGINX_PORT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          
          
  deploy: 
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          allenvs: true
          script: |
            cd whiteboard
            sudo docker compose -f docker-compose-deploy.yml pull
            sudo docker compose -f docker-compose-deploy.yml up -d
          
