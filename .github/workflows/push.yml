name: Push Docker Images
on:
  push:
    branches:
      - main

jobs:
  push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Actions
        uses: docker/setup-buildx-action@v2

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/whiteboard-frontend
            ${{ secrets.DOCKERHUB_USERNAME }}/whiteboard-backend

      - name: Build and push Docker images
        run: |
          docker compose -f docker-compose-deploy.yml build
          docker compose -f docker-compose-deploy.yml push
        env:
          NODE_ENV: production
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

          SERVER_PORT: ${{ vars.SERVER_PORT }}
          CLIENT_PORT: ${{ vars.CLIENT_PORT }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

          SECRET: ${{ secrets.SECRET }}
          SALT_ROUNDS: ${{ vars.SALT_ROUNDS }}
