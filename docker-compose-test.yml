version: "latest"
services:
  test-backend:
    build: ./backend
    command: ["npm", "run", "test"]
    env_file:
      - ./backend/.env
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy

  # frontend:
  #   build:
  #     context: ./frontend
  #     args:
  #       - NODE_ENV=${NODE_ENV}
  #       - VITE_SERVER_PORT=${VITE_SERVER_PORT}
  #   ports:
  #     - 2094:2094
  #   depends_on:
  #     - backend

  db:
    image: postgres:latest
    volumes:
      - ./data/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
    ports:
      - 5432:5432
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 10
