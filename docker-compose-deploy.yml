version: "latest"
services:
  backend:
    build: ./backend
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    build:
      context: ./frontend
      args:
        - NODE_ENV=${NODE_ENV}
        - VITE_SERVER_PORT=${SERVER_PORT}
    ports:
      - 2094:2094
    depends_on:
      - backend

  db:
    image: postgres:latest
    volumes:
      - whiteboard-data:/var/lib/postgresql
      - ./data/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
    ports:
      - ${POSTGRES_PORT}:5432
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  whiteboard-data:
